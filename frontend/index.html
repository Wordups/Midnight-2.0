<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Midnight — Policy Migration Engine</title>

<style>
body {
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#020916;
  color:white;
}

.container {
  max-width:900px;
  margin:80px auto;
  padding:40px;
}

h1 {
  font-size:48px;
  margin-bottom:10px;
}

.subtitle {
  color:#9fb3d1;
  margin-bottom:40px;
}

.card {
  background:#071122;
  padding:30px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
}

label {
  display:block;
  margin-bottom:6px;
  font-size:13px;
  color:#8fa4c5;
}

input, select {
  width:100%;
  padding:10px;
  margin-bottom:20px;
  background:#0c1830;
  border:1px solid rgba(255,255,255,0.1);
  color:white;
  border-radius:6px;
}

button {
  padding:12px 20px;
  margin-right:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.primary {
  background:#00c3e3;
  color:black;
}

.secondary {
  background:#1b2a4a;
  color:white;
}

#status {
  margin-top:15px;
  font-size:13px;
  color:#8fa4c5;
}

pre {
  background:#01060f;
  padding:20px;
  margin-top:20px;
  max-height:300px;
  overflow:auto;
  color:#dce6f5;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;
  white-space:pre-wrap;
  word-break:break-word;
}
</style>
</head>

<body>

<div class="container">

<h1>Midnight</h1>
<div class="subtitle">Policy Migration Engine — by Takeoff</div>

<div class="card">

<label>Legacy Policy File</label>
<input type="file" id="file">

<label>Logo (optional)</label>
<input type="file" id="logo">

<label>Template</label>
<select id="template">
  <option>Generic Policy Template</option>
  <option>Wipro HealthPlan Services</option>
</select>

<button class="primary" onclick="preview()">Transform Policy</button>
<button class="secondary" onclick="generate()">Generate Document</button>

<div id="status">Waiting for input...</div>

<pre id="output"></pre>

</div>
</div>

<script>

let policyData = null;
let logoToken = null;

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

async function preview() {
  const file = document.getElementById("file").files[0];
  const logo = document.getElementById("logo").files[0];
  const template = document.getElementById("template").value;
  const output = document.getElementById("output");

  if (!file) {
    setStatus("Upload a file first.");
    return;
  }

  setStatus("Processing...");
  output.textContent = "";

  const form = new FormData();
  form.append("source_file", file);
  form.append("template_name", template);
  if (logo) form.append("logo_file", logo);

  try {
    const res = await fetch("http://127.0.0.1:8000/api/migrate/preview", {
      method: "POST",
      body: form
    });

    const data = await res.json();
    console.log("Preview response:", data);

    if (!res.ok) {
      throw new Error(data.detail || "Preview failed.");
    }

    policyData = data.policy_data;
    logoToken = data.logo_token;

    // Show FULL response for debugging
    output.textContent = JSON.stringify(data, null, 2);

    setStatus("Preview ready.");
  } catch (e) {
    output.textContent = "ERROR:\n" + e.message;
    setStatus("Error: " + e.message);
  }
}

async function generate() {
  if (!policyData) {
    setStatus("Run preview first.");
    return;
  }

  setStatus("Generating document...");

  try {
    const res = await fetch("http://127.0.0.1:8000/api/migrate/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        policy_data: policyData,
        logo_token: logoToken
      })
    });

    if (!res.ok) {
      throw new Error("Generate failed");
    }

    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "policy.docx";
    a.click();

    setStatus("Download complete.");
  } catch (e) {
    setStatus("Error: " + e.message);
  }
}

</script>

</body>
</html>
